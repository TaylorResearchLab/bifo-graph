version: 0.7.1
description: >
  DDKG/UBKG-to-BIFO cross-mapping. v0.7.1 — final polish.
  Changes from v0.7.0:
    - Fixed: inverse_has_best_classification inconsistency — now matches
      forward classification (weak_mechanistic_or_observational)
    - Tightened: semantic_limitations opening sentence — removes "intent"
      framing, now reads as a formal definition aligned with methods-paper tone
  Final classification distribution:
    mechanistic=99, weak_mechanistic_or_observational=61,
    observational=44, contextual_constraint=29, nonpropagating_context=18
    Total: 251 predicate entries, 56 entity-pair overrides, 164 SABs mapped

graph_assumptions:
  ddkg_schema: UBKG/Petagraph-style property graph with Concept backbone and Code/Term metadata.
  primary_traversable_nodes: [Concept]
  metadata_node_labels: [Code, Term, Definition, SemanticType]
  non_flow_metadata_edges:
    - CODE
    - PREF_TERM
    - PT
    - SYN
    - ACR
    - DEF
    - STY
    - label
    - synonym
    - xref
    - cross_reference

entity_classes:
  G: Genetic sequence and variation
  CH: Chromatin state over genomic regions
  RNA: Transcripts with role-dependent function
  P: Proteins with state-dependent activity
  CM: Macromolecular complexes and assemblies
  SM: Small molecules with role-dependent semantics
  ION: Ionic and electrochemical state
  PW: Pathways and biological programs
  C: Cellular configuration / cell types / cell populations
  S: Spatial context across scales
  PH: Phenotype
  DS: Disease
  X: External perturbations
  MECH: Mechanical and physical state

node_resolution:
  prefer_concept_nodes: true
  concept_resolution_strategy: >
    Infer BIFO type for Concept nodes from attached Code nodes.
    If multiple candidates, select most specific using priority_order.
  priority_order:
    # When a Concept has Code nodes from multiple SABs that map to different
    # BIFO entity classes, this ordering resolves the ambiguity by selecting
    # the most clinically and biologically terminal class.
    #
    # Justification for ordering:
    #   DS > PH: A Concept co-coded as both a disease (MONDO) and a phenotype
    #     (HPO) represents a disease entity; the phenotype is a manifestation.
    #   PH > PW: A phenotype-pathway Concept represents an observable trait,
    #     not just a process.
    #   PW > C: A pathway-cell Concept is primarily a functional program.
    #   C > CM: A cell type that includes a complex annotation is primarily
    #     a cell entity.
    #   CM > P: A complex that includes protein annotation is primarily the
    #     assembled complex, not its individual subunits.
    #   P > RNA > CH > G: Protein is downstream of RNA, which is downstream
    #     of chromatin, which is downstream of sequence — following the
    #     central dogma. For a Concept co-coded across these layers, the
    #     most processed form takes precedence.
    #   SM > ION: Small molecules include ionic species; ION is a subtype.
    #   S last among biological classes: spatial context is a modifier,
    #     not an entity class in its own right.
    #   X, MECH: External perturbations and mechanical state are modifiers.
    #
    # This ordering reflects BIFO's information-flow direction: signal
    # propagates from upstream (G, CH) to downstream (P, PH, DS). When
    # ambiguous, we classify at the downstream end.
    - DS
    - PH
    - PW
    - C
    - CM
    - P
    - RNA
    - CH
    - G
    - SM
    - ION
    - S
    - X
    - MECH

