ddkg_notes:
  concept_backbone: >
    Traversal over Concept-to-Concept edges only.
    Code/Term edges are metadata; exclude from propagation.
    Term nodes carrying human-readable labels attach to Concept nodes
    via PREF_TERM, not to Code nodes.
  kfpt: >
    KFPT nodes carry Kids First variant burden scores.
    Mapped to G (variant) for entity resolution and seed construction.
    Use value field as confidence proxy where available.
  hsclo: >
    HSCLO/HSCLO38 nodes are spatial scaffold. Act as context constraints;
    do not use as long-range propagation carriers.
  go_subontology: >
    GO terms require subontology disambiguation. Python checks OBO namespace
    (primary path) then row-level heuristic (fallback). Default: PW.
    Download OBO: wget https://purl.obolibrary.org/obo/go.obo
  biomarker: >
    BIOMARKER SAB (183,322 codes, AA-prefixed IDs) represents laboratory and
    blood biomarkers — measurable entities validated as disease/phenotype
    indicators. Not mapped to a single BIFO entity class because the underlying
    entities (proteins, small molecules, genes) resolve correctly through
    co-occurring CHEBI/UNIPROTKB/HGNC codes. The biomarker relationship is
    an observational association at the edge level, not an entity class.
  semantic_limitations: >
    IMPORTANT FOR REVIEWERS: The "mechanistic" classification in this mapping
    indicates that the edge represents a directed biological transformation
    suitable for propagation under BIFO constraints — it does NOT assert
    experimental proof of causality.
    Specifically: (1) Edge labels reflect normalized predicate names from UMLS
    RELA and source ontologies; the underlying evidence varies by source SAB
    (experimental, curated, inferred, or predicted). (2) Evidence strength is
    handled separately through the edge weighting system: experimental=1.0,
    curated=0.75, inferred=0.5, predicted=0.25. (3) "Mechanistic" means the
    edge represents a directed biological transformation that is admissible
    for forward propagation under BIFO constraints — not that the relationship
    has been verified by a causal experiment in the source data. (4) Edges
    from probabilistic sources (STRING, LINCS correlation) or literature-
    inferred annotations (GO, Reactome) are classified as
    weak_mechanistic_or_observational and receive lower default weights.
    This distinction between semantic admissibility and experimental proof
    is explicit in the BIFO specification and should be described as such
    in the Methods section of any paper using this mapping.
  ro_predicates: >
    IMPORTANT: Edges with r.SAB = 'RO' in DDKG originate from UMLS REL=RO,
    which means "has relationship other than synonymous, narrower, or broader"
    — a catch-all bucket with no specific biological semantics. These are
    NOT Relations Ontology (RO) predicates and are excluded from mechanistic
    flow modeling (listed in non_flow_edges as 'ro').
    The Relations Ontology proper does not appear as CURIEs in DDKG edges.
    Instead, RO semantics enter through RELA-derived edge names
    (e.g. expressed_in, regulates, molecularly_interacts_with) which carry
    RO-equivalent meaning. The ro_curie annotation fields in predicate_to_flow
    document this equivalence for reference but are never used as lookup keys —
    all matching is done on the DDKG edge name string.
  dgn_sabs: >
    All DGN* SABs (DGNBM, DGNCM, DGNCR, DGNFU, DGNGCM, DGNGDA, DGNGMM,
    DGNGV, DGNMM, DGNSCM, DGNSM, DGNTH, DGNV, DGNAGE) contain PubMed abstract
    sentences as their PREF_TERM names. These are DisGeNET evidence provenance
    records, not biological entities. All ignored. The biological content they
    support (genes, diseases, variants) resolves via HGNC, MONDO, HPO, DBSNP.
  tiny_sabs: >
    The new DDKG build (v2) contains ~337 SABs with fewer than 10 codes each.
    These are: ~292 numeric IDs (e.g. 403620), ~10 URL-fragment SABs
    (GENEREPORT?ID=49845), ~22 anatomy tissue-named SABs
    (KIDNEY-NEPHRON, LUNG-PULMONARY-ALVEOLUS etc), ~10 LP/LA LOINC-style
    codes, and a handful of others (LMHA, XSD). All have 1-3 codes and their
    Concepts will resolve via other SABs (UBERON, CL, HGNC etc) already
    mapped. The Python resolve_code_entity function handles these by simply
    returning None (no match), causing them to fall through to other Code
    nodes on the same Concept. No explicit listing in ignored_or_auxiliary_sabs
    is required for these — they are harmless non-matches.
    MMSET1, MMSET2CN, MMSET4 are Mus musculus neuroanatomical connectivity
    descriptions (ganglion-to-organ pathways). Mapped to S.
    MMSL and MMX are MeSH chemical records. Mapped to SM.
    GS codes are MeSH substance records (chemicals), not gene IDs. Mapped to SM.
    NPOKB codes are Allen Cell Types (mouse neuron descriptions). Mapped to C.
