    # --- HuBMAP/SenNet/HRA metadata (not biological entities) ---
    - HMFIELD      # HuBMAP metadata field schema
    - HRAVS        # Human Reference Atlas value sets (measurement metadata)
    - CEDAR        # CEDAR metadata templates (data management infrastructure)
    - RRID         # Research Resource Identifiers (lab equipment)
    - MS           # Mass Spectrometry ontology (instrument/method types)
    - OLAM         # Ontology for laboratory animal management (euthanasia methods)
    - MTPEXP       # MoTrPAC expression data (study-specific rat gene nodes)
    # --- Tiny SABs (<10 codes) — malformed imports or single-concept stubs ---
    # 292 numeric SABs, 10 URL-fragment SABs, 22 anatomy-named tissue SABs,
    # 10 LP/LA LOINC-style SABs, and a few others all with 1 code each.
    # These resolve via other SABs (UBERON, CL etc) on the same Concept.
    - LMHA
    - XSD
    # --- BIOMARKER: intentionally not mapped to a single entity class ---
    # BIOMARKER codes (AA-prefixed, 183,322 codes) represent laboratory/blood
    # biomarkers — small molecules, proteins, and other measurable entities
    # validated as indicators of disease or phenotype state.
    # These Concepts resolve to SM, P, G, or RNA through co-occurring Code nodes
    # from CHEBI, UNIPROTKB, HGNC etc. Mapping BIOMARKER as a SAB would risk
    # misclassifying entities already correctly typed by their other codes.
    # The biomarker relationship (entity indicates disease/phenotype) is an
    # observational association handled at the edge level, not an entity class.
    - BIOMARKER

edge_resolution:
  non_flow_edges:
    # --- UBKG/DDKG metadata edges ---
    - CODE
    - PREF_TERM
    - PT
    - SYN
    - ACR
    - DEF
    - STY

    # --- UMLS REL single-letter hierarchy/structural codes ---
    # These are UMLS Metathesaurus REL values, not Relations Ontology.
    # 'ro' here means UMLS "has relationship other than synonymous/narrower/broader"
    # — a catch-all with no specific biological semantics. Not the RO ontology.
    - chd       # has child relationship (1,583,573 edges)
    - par       # has parent relationship (1,583,573 edges)
    - ro        # UMLS RO — relationship other than syn/narrower/broader (782,966 edges)
    - aq        # allowed qualifier (630,118 edges)
    - qb        # can be qualified by (630,118 edges)
    - rb        # has broader relationship (345,847 edges)
    - rn        # has narrower relationship (345,847 edges)
    - rq        # related and possibly synonymous (52,518 edges)
    - sy        # source asserted synonymy (5,544 edges)

    # --- OWL/ontology hierarchy edges ---
    - is_a
    - subClassOf
    - part_of
    - inverse_part_of
    - related_to
    - same_as
    - equivalent_to
    - isa              # UMLS variant of is_a
    - inverse_isa
    - refers_to        # UMLS cross-reference (7,873,154 edges — lexical)
    - inverse_refers_to

    # --- UMLS/DDKG infrastructure ---
    - mapped_from
    - mapped_to
    - primary_mapped_from
    - primary_mapped_to
    - other_mapped_from
    - other_mapped_to
    - possibly_equivalent_to
    - concept_in_subset
    - subset_includes_concept
    - moved_to
    - moved_from
    - was_a
    - replaced_by
    - replaces
    - alternative_of
    - has_alternative
    - in_ubkg_context
    - has_sab
    - has_name
    - has_download_date
    - has_source_version
    - has_home_url
    - has_pipeline_shorthand
    - has_tbl_schema
    - has_valueset
