    CLINVAR: G
    DBSNP: G
    GNOMAD: G
    KFPT: G                 # Kids First variant burden — treat as G(variant)
    KFGENEBIN: G            # Kids First gene-level variant burden bins
    PLEXIFORM: G            # Plexiform neurofibroma dataset — ENSG IDs, no co-SABs (31,437 codes)
    REFSEQ: G               # NCBI RefSeq gene/transcript sequences
    CHR: G                  # Chromosome identifiers
    SO: G                   # Sequence Ontology — sequence features
    MGI: G                  # Mouse Genome Informatics gene orthology
    JAX: G                  # Jackson Laboratory mouse gene/strain
    GTEXEQTL: G             # GTEx eQTL variants
