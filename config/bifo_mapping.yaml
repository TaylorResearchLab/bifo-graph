  codeid_regex_to_entity:
    - {pattern: '^ENSG\d+$',    entity: G}
    - {pattern: '^ENST\d+$',    entity: RNA}
    - {pattern: '^ENSP\d+$',    entity: P}
    - {pattern: '^rs\d+$',      entity: G}
    - {pattern: '^R-HSA-\d+$',  entity: PW}
    - {pattern: '^CL:\d+$',     entity: C}
    - {pattern: '^UBERON:\d+$', entity: S}
    - {pattern: '^HP:\d+$',     entity: PH}
    - {pattern: '^MONDO:\d+$',  entity: DS}
    - {pattern: '^CHEBI:\d+$',  entity: SM}
    - {pattern: '^GO:\d+$',     entity: PW}   # default; overridden by go_subontology_override
    - {pattern: '^PR:\d+$',     entity: P}

  go_subontology_override:
    # Python resolves GO terms via OBO namespace (primary) then row heuristic (fallback).
    # These flags control which mappings are active.
    compartment_terms_to_S: true     # cellular_component namespace → S
    complex_terms_to_CM: true        # cellular_component + "complex" in name → CM
    biological_process_terms_to_PW: true
    molecular_function_terms_to_PW: true
    # Column names to check for namespace/label on individual rows (fallback only)
    namespace_columns: [namespace, go_aspect, aspect, term_type, category]
    label_columns: [name, label, term, preferred_name, code]

  sab_overrides:
    ENSEMBL:
      use_prefix_disambiguation: true

