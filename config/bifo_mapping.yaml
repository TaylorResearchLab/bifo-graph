control_modes:
  # Documents intended semantics of each benchmark arm.
  # Python implements these; this section is for reproducibility auditing.
  raw:
    description: No filtering. All concept-to-concept edges, uniform weight 0.5.
    filter_non_flow: false
    filter_observational: false
    filter_by_entity_pair: false

  metadata_filtered:
    description: >
      Remove metadata/hierarchy edges (CODE, is_a, part_of, etc.).
      Retain all remaining edges as propagating, including observational.
      Edges are NOT reoriented from YAML direction fields — direction is
      inherited from the raw export. This arm isolates the effect of
      annotation noise removal, independently of biological admissibility.
    filter_non_flow: true
    filter_observational: false
    filter_by_entity_pair: false

  conditioned:
    description: >
      Full BIFO conditioning. Mechanistic edges propagate;
      observational edges retained but non-propagating.
    filter_non_flow: true
    filter_observational: true
    filter_by_entity_pair: true

  random_sparsified:
    description: >
      Randomly sample conditioned edge count from RAW concept-to-concept edges.
      Tests edge-count reduction in isolation.
      Pool is raw_concept_edges, not metadata_filtered edges.
    random_seed: 1
    sample_from: raw_concept_edges

