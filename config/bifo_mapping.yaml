  predicate_to_flow:
    # =========================================================
    # IMPORTANT: All keys are DDKG edge type names (ground truth
    # from DDKG_v2_relationships_edge_types_query.csv).
    # ro_curie is annotation only — never used as a lookup key.
    # RO CURIEs are provided where the DDKG edge name matches
    # the Relations Ontology definition exactly.
    #
    # NOTE ON INVERSE EDGES: In DDKG, inverse_ prefixed edges are
    # first-class graph edges present in the catalog — NOT computed
    # by the Python. High-count inverses (>=10,000 edges) are
    # explicitly mapped at the end of this section. Lower-count
    # inverses fall through as unmapped and are dropped, which is
    # acceptable given their minimal propagation contribution.
    # =========================================================

    # ---------------------------------------------------------
    # CENTRAL DOGMA
    # ---------------------------------------------------------
    transcribed_from:
      ro_curie: RO:0002510
      flow: Transcription
      direction: target_to_source   # RNA ← G/CH
      classification: mechanistic

    transcribed_to:
      flow: Transcription
      direction: source_to_target   # G/CH → RNA
      classification: mechanistic

    expressed_in:
      ro_curie: RO:0002292
      flow: Transcription
      direction: source_to_target   # G/RNA → S
      classification: mechanistic
      note: entity-pair override resolves G→S vs RNA→S

    expresses:
      flow: Transcription
      direction: target_to_source   # S → G/RNA (inverse)
      classification: mechanistic

    gene_encodes_gene_product:
      flow: Translation
      direction: source_to_target   # G → P
      classification: mechanistic

    gene_product_encoded_by_gene:
      flow: Translation
      direction: target_to_source   # P ← G
      classification: mechanistic

    gene_product_of:
      flow: Translation
      direction: target_to_source   # P ← G
      classification: mechanistic

    has_gene_product:
      flow: Translation
      direction: source_to_target   # G → P
      classification: mechanistic

    has_isoform:
      flow: Translation
      direction: source_to_target
      classification: mechanistic

    has_expression:
      flow: Transcription
      direction: source_to_target
      classification: weak_mechanistic_or_observational
      note: GTEx expression association

    gene_product_expressed_in_tissue:
      flow: Transcription
      direction: source_to_target   # P → S
      classification: weak_mechanistic_or_observational

    tissue_is_expression_site_of_gene_product:
      flow: Transcription
      direction: target_to_source
      classification: weak_mechanistic_or_observational

    transcriptiontranslation:
      flow: Transcription
      direction: source_to_target
      classification: weak_mechanistic_or_observational

    has_pro_entry:
      flow: Translation
      direction: source_to_target
      classification: weak_mechanistic_or_observational

    has_refseq_id:
      flow: Translation
      direction: source_to_target
      classification: weak_mechanistic_or_observational

    # ---------------------------------------------------------
    # REGULATION (entity-pair dependent — see overrides)
