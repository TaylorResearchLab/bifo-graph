    - has_license_subtype
    - has_etl_command
    - has_etl_owl
    - has_dir_schema
    - used_in_schema
    - used_in_dataset
    - used_in_entity
    - used_for_dataset_type
    - is_from_source
    - has_source_type
    - has_source_dictionary_url
    - has_prefix
    - has_datatype
    - has_two_character_code
    - has_active_status
    - has_dataset_type
    - has_topic
    - has_provider
    - has_vitessce_hint
    - dataset_has_file
