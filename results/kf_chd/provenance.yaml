# BIFO-PPR Analysis Provenance — KF-CHD
# Filled out for testing. Replace TEST values with real information before submission.

analysis:
  type: rare-variant-cohort
  description: >
    Rare variant pathway enrichment analysis of 697 congenital heart defect
    probands from the Kids First program using BIFO-conditioned Personalized
    PageRank over the Data Distillery Knowledge Graph.
  variant_type: germline
  input_data_type: germline-rare-variants
  input_data_description: >
    Seeds are genes carrying predicted deleterious germline variants (MAF<0.01,
    CADD>=20) in 697 pediatric congenital heart defect probands from the Kids
    First Pediatric Research Program. This is a germline rare variant analysis
    — not a somatic mutation analysis. Canonically somatic drivers such as
    oncogene amplifications or structural rearrangements are not expected in
    the seed list. The enrichment signal reflects germline genetic burden
    across the cohort, not the somatic oncogenic landscape of any individual
    tumor.

cohort:
  name: KF-CHD
  disease: congenital heart disease
  n_probands: 697
  source: Kids First Pediatric Research Program
  repository: dbGaP
  accession: phs001138.v3.p2
  data_access_url: https://kidsfirstdrc.org
  demographics: 697 pediatric probands with congenital heart defects
  irb_protocol: null

knowledge_graph:
  name: Data Distillery Knowledge Graph (DDKG)
  version: August 2025 release
  doi_or_url: https://doi.org/10.1101/2025.08.11.666099
  export_query_file: /mnt/isilon/taylor_lab/data/projects/BIFO_2026/bifo-graph/cypher/kf_chd_export_queries.cypher
  export_query_text: null

pipeline:
