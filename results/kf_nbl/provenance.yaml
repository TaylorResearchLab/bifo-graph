# BIFO-PPR Analysis Provenance — KF-NBL
# Filled out for testing. Replace TEST values with real information before submission.

analysis:
  type: rare-variant-cohort
  description: >
    Rare variant pathway enrichment analysis of 460 neuroblastoma
    probands from the Kids First program using BIFO-conditioned Personalized
    PageRank over the Data Distillery Knowledge Graph.
  variant_type: germline
  input_data_type: germline-rare-variants
  input_data_description: >
    Seeds are genes carrying predicted deleterious germline variants (MAF<0.01,
    CADD>=20) in 460 pediatric neuroblastoma probands from the Kids First
    Pediatric Research Program. This is a germline rare variant analysis —
    not a somatic mutation analysis. The canonical somatic neuroblastoma
    drivers — MYCN amplification, TERT structural rearrangements, LIN28B
    overexpression, ALK activating mutations (somatic), and ATRX loss —
    are not expected in the seed list because they are primarily somatically
    acquired, not germline-disrupted. The enrichment signal reflects germline
    genetic predisposition burden across the cohort. Germline predisposition
    genes such as BARD1, ALK (germline), PHOX2B, and DNA repair genes are
    expected to appear.

cohort:
  name: KF-NBL
  disease: neuroblastoma
  n_probands: 460
  source: Kids First Pediatric Research Program
  repository: dbGaP
  accession: phs001436.v1.p1  # VERIFY: confirm correct KF neuroblastoma accession before submission
  data_access_url: https://kidsfirstdrc.org
  demographics: 460 pediatric probands with neuroblastoma
  irb_protocol: null

knowledge_graph:
  name: Data Distillery Knowledge Graph (DDKG)
  version: August 2025 release
  doi_or_url: https://doi.org/10.1101/2025.08.11.666099
  export_query_file: /mnt/isilon/taylor_lab/data/projects/BIFO_2026/bifo-graph/cypher/kf_nbl_export_queries.cypher
  export_query_text: null

