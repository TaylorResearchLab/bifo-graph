  bifo_ontology_file: /mnt/isilon/taylor_lab/data/projects/BIFO_2026/bifo-graph/config/bifo_mapping.yaml
  pipeline_log_file: /mnt/isilon/taylor_lab/data/projects/BIFO_2026/logs/kf_nbl_score_pathways.log
  score_pathways_command: null
  python_version: null

