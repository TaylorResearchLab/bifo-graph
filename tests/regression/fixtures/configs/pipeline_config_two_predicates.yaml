# Fixture: pipeline_config that lists TWO predicates under MSIGDB.
# Used together with bifo_mapping_two_errors.yaml to test that
# cross-validation collects all errors before raising (so users see
# multiple problems at once instead of fix-one-rerun-fix-next).

schema_version: 1

pathway_sources:
  MSIGDB:
    enabled: true
    propagating_predicates_g_to_pw:
      - inverse_pathway_associated_with_gene  # will be wrongly classified
      - inverse_has_signature_gene            # will be wrong direction
    kg_name_prefixes:
      - HALLMARK_

gene_sabs:
  - HGNC

burden_control_exclusions: []
